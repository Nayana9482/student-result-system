<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Student</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">✏️ Update Student</span>
    <div>
        <a href="/" class="btn btn-light btn-sm">Home</a>
        <a href="/dashboard" class="btn btn-info btn-sm">Dashboard</a>
        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card shadow border-0 p-4">

                <h3 class="text-center mb-4">✏️ Update Marks</h3>

                <form method="POST">

                    <div class="mb-3">
                        <label for="s1" class="form-label">Subject 1</label>
                        <input type="number" id="s1" name="s1" class="form-control"
                               value="{{ student[2] }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="s2" class="form-label">Subject 2</label>
                        <input type="number" id="s2" name="s2" class="form-control"
                               value="{{ student[3] }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="s3" class="form-label">Subject 3</label>
                        <input type="number" id="s3" name="s3" class="form-control"
                               value="{{ student[4] }}" required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Update</button>
                    </div>

                </form>

            </div>

        </div>
    </div>

</div>

</body>
</html>
