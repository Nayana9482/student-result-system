<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Topper</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">🏆 Top Performer</span>
    <div>
        <a href="/" class="btn btn-light btn-sm">Home</a>
        <a href="/dashboard" class="btn btn-info btn-sm">Dashboard</a>
        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card shadow border-0 text-center p-4">

                <h3 class="mb-4">🏆 Top Student</h3>

                {% if topper %}
                    <h2 class="text-success">{{ topper[0] }}</h2>
                    <p class="fs-4">Percentage: <strong>{{ topper[1] }}%</strong></p>
                {% else %}
                    <p>No data available</p>
                {% endif %}

            </div>

        </div>
    </div>

</div>

</body>
</html>
