<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">🎓 Student Dashboard</span>
    <div>
        <a href="/" class="btn btn-light btn-sm">Home</a>
        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-4">

    <h2 class="text-center mb-4">📊 Dashboard Overview</h2>

    <!-- Topper Card -->
    <div class="card shadow mb-4 border-0">
        <div class="card-body text-center">
            <h4 class="mb-3">🏆 Top Performer</h4>

            {% if topper %}
                <h3 class="text-success">{{ topper[0] }}</h3>
                <p class="fs-5">Percentage: <strong>{{ topper[1] }}%</strong></p>
            {% else %}
                <p>No data available</p>
            {% endif %}
        </div>
    </div>

    <!-- Charts -->
    <div class="row g-4">

        <!-- Bar Chart -->
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-body">
                    <h5 class="card-title text-center">📊 Student Percentages</h5>
                    <canvas id="barChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Subject Comparison -->
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-body">
                    <h5 class="card-title text-center">📈 Subject Comparison</h5>
                    <canvas id="subjectChart"></canvas>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
    const studentData = JSON.parse('{{ data | tojson | safe }}');

    const names = studentData.map(x => x[0]);
    const percentages = studentData.map(x => x[1]);
    const s1 = studentData.map(x => x[2]);
    const s2 = studentData.map(x => x[3]);
    const s3 = studentData.map(x => x[4]);

    // Bar Chart
    new Chart(document.getElementById('barChart'), {
        type: 'bar',
        data: {
            labels: names,
            datasets: [{
                label: 'Percentage',
                data: percentages,
                backgroundColor: 'rgba(54, 162, 235, 0.6)'
            }]
        }
    });

    // Line Chart
    new Chart(document.getElementById('subjectChart'), {
        type: 'line',
        data: {
            labels: names,
            datasets: [
                { label: 'Subject 1', data: s1, borderColor: 'red' },
                { label: 'Subject 2', data: s2, borderColor: 'green' },
                { label: 'Subject 3', data: s3, borderColor: 'blue' }
            ]
        }
    });
</script>

</body>
</html>
